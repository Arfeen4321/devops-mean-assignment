version: "3"

services:

  mongodb:
    image: mongo
    container_name: mongodb
    volumes:
      - mongo-data:/data/db

  backend:
    image: arfeen3421/backend:latest
    container_name: backend
    depends_on:
      - mongodb

  frontend:
    image: arfeen3421/frontend:latest
    container_name: frontend

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
volumes:
  mongo-data:
